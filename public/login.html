<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Administrador - Torneo</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <header>
        <div class="header-inner">
            <div class="header-logo">⚽</div>

            <div class="header-titles">
                <h1>TORNEO <span>BENÉFICO</span></h1>
                <p>Panel de administración</p>
            </div>

            <div class="header-date">
                <div class="day">30</div>
                <div class="month">Mayo 2026</div>
            </div>
        </div>
    </header>

    <nav>
        <div class="nav-inner">
            <a class="nav-btn" href="index.html">🏠 Inicio</a>
            <a class="nav-btn" href="cuadrante.html?categoria=benjamin">Cuadrante <span
                    class="nav-cat">Benjamín</span></a>
            <a class="nav-btn" href="cuadrante.html?categoria=alevin">Cuadrante <span
                    class="nav-cat alevin">Alevín</span></a>
            <a class="nav-btn" href="patrocinadores.html">🤝 Patrocinadores</a>
            <a class="nav-admin-btn active" href="login.html">⚙ Admin</a>
        </div>
    </nav>

    <main class="login-page">

        <section class="login-card">
            <div class="login-icon">🔐</div>

            <h2>Panel Admin</h2>

            <p>
                Introduce la contraseña para acceder al panel de administración.
            </p>

            <form id="form-login">
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary">Entrar</button>

                <div class="login-error" id="login-error"></div>
            </form>
        </section>

    </main>

    <footer>
        <strong>Torneo Benéfico CD San Roque EFF</strong><br>
        <span>Acceso privado para administradores</span>
    </footer>

    <script src="js/login.js"></script>
</body>

</html>
