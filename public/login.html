<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Administrador - Torneo</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <header>
        <div class="header-inner">
            <div class="header-logo">⚽</div>

            <div class="header-titles">
                <h1>TORNEO <span>BENÉFICO</span></h1>
                <p>Panel de administración</p>
            </div>

            <div class="header-date">
                <div class="day">30</div>
                <div class="month">Mayo 2026</div>
            </div>
        </div>
    </header>

    <nav>
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" type="button">
            ☰ Menú
        </button>

        <div class="nav-inner" id="nav-menu"></div>
    </nav>

    <main class="login-page">

        <section class="login-card">
            <div class="login-icon">🔐</div>

            <h2>Panel Admin</h2>

            <p>
                Introduce la contraseña para acceder al panel de administración.
            </p>

            <form id="form-login">
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary">Entrar</button>

                <div class="login-error" id="login-error"></div>
            </form>
        </section>

    </main>

    <<footer>
        <strong id="footer-titulo">Torneo</strong><br>
        <span id="footer-subtitulo">Cargando información...</span>

        <div class="footer-developer">
            <p>
                Web diseñada y desarrollada por
                <strong>Amin Fritah Talib</strong>
            </p>

            <div class="footer-developer-links">
                <a href="https://wa.me/34661808147" target="_blank" rel="noopener noreferrer">
                    WhatsApp
                </a>

                <a href="https://www.linkedin.com/in/amin-fritah-talib-205873261/" target="_blank"
                    rel="noopener noreferrer">
                    LinkedIn
                </a>
            </div>
        </div>
        </footer>

        <script src="js/menu-movil.js"></script>
        <script src="js/login.js"></script>
</body>

</html>
