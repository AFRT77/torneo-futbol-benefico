<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Torneo</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <header>
        <div class="header-inner">
            <div class="header-logo" id="header-logo">⚽</div>

            <div class="header-titles">
                <h1 id="header-titulo">TORNEO <span>BENÉFICO</span></h1>
                <p id="header-subtitulo">Cargando torneo...</p>
            </div>

            <div class="header-date">
                <div class="day" id="header-dia">--</div>
                <div class="month" id="header-mes">----</div>
            </div>
        </div>
    </header>

    <nav>
        <div class="nav-inner" id="nav-menu"></div>
    </nav>

    <main>

        <section class="home-hero">
            <div class="home-hero-badge" id="hero-badge">🎗 TORNEO SOLIDARIO</div>

            <h2 id="hero-titulo"></h2>

            <div class="home-hero-sub" id="hero-subtitulo">
                Cargando información...
            </div>
        </section>

        <section class="home-info-grid">

            <article class="info-card">
                <div class="card-icon">📍</div>
                <h3>Ubicación</h3>
                <p id="info-ubicacion">Cargando...</p>
            </article>

            <article class="info-card">
                <div class="card-icon">🗓</div>
                <h3>Fecha y horarios</h3>
                <p id="info-fecha">Cargando...</p>
            </article>

            <article class="info-card">
                <div class="card-icon">🤝</div>
                <h3>Causa</h3>
                <p id="info-causa">Cargando...</p>
            </article>

            <article class="info-card">
                <div class="card-icon">🏆</div>
                <h3>Categorías</h3>
                <p id="info-categorias">Cargando...</p>
            </article>

        </section>

        <section class="section-block">
            <h2 class="section-title">VER <span>CUADRANTES</span></h2>

            <div class="categories-section" id="categorias-container">
                <!-- Categorías generadas con JavaScript -->
            </div>
        </section>

        <section class="section-block">
            <h2 class="section-title">EQUIPOS <span>PARTICIPANTES</span></h2>

            <div class="teams-grid" id="equipos-container">
                <!-- Equipos generados con JavaScript -->
            </div>
        </section>

        <section class="section-block">
            <h2 class="section-title">SORTEOS <span>Y ACTIVIDADES</span></h2>

            <div class="sorteos-grid" id="sorteos-container">
                <!-- Sorteos generados con JavaScript -->
            </div>
        </section>

    </main>

    <footer>
        <strong id="footer-titulo">Torneo</strong><br>
        <span id="footer-subtitulo">Cargando información...</span>
    </footer>

    <script src="js/index.js"></script>
</body>

</html>
