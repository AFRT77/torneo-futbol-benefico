<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patrocinadores - Torneo</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/patrocinadores.css">
</head>

<body>

    <header>
        <div class="header-inner">
            <div class="header-logo" id="header-logo">⚽</div>

            <div class="header-titles">
                <h1 id="header-titulo">TORNEO <span>BENÉFICO</span></h1>
                <p id="header-subtitulo">Cargando torneo...</p>
            </div>

            <div class="header-date">
                <div class="day" id="header-dia">--</div>
                <div class="month" id="header-mes">----</div>
            </div>
        </div>
    </header>

    <nav>
        <div class="nav-inner" id="nav-menu"></div>
    </nav>

    <main class="sponsors-page">

        <section class="sponsors-hero">
            <div class="home-hero-badge">🤝 COLABORADORES DEL TORNEO</div>

            <h2>PATROCINADORES y COLABORADORES</h2>

            <p id="sponsors-description">
                Gracias a todos los comercios, empresas y colaboradores que hacen posible este torneo benéfico.
            </p>
        </section>

        <section class="section-block">
            <h2 class="section-title">NUESTROS <span>PATROCINADORES <span>Y COLABORADORES</span></h2>

            <div class="sponsors-grid" id="sponsors-grid">
                <!-- Aquí se pintarán los patrocinadores con JavaScript -->
            </div>
        </section>

    </main>

    <footer>
        <strong id="footer-titulo">Torneo</strong><br>
        <span id="footer-subtitulo">Cargando información...</span>
    </footer>

    <script src="js/patrocinadores.js"></script>
</body>

</html>
